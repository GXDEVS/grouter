# grouter no Kubernetes
#
# Só o spec editável (não includes status, resourceVersion, managedFields — o API gera
# isso; um dump de `kubectl get` vem a mais).
#
# Alterações mínimas para dados persistentes e permissão do PVC:
#   - volume mount /app  →  /data   (grouter: HOME=/data, grouter.db)
#   - pod securityContext fsGroup + runAsUser/Group 100/101 + init chown
#
# Aplicar: kubectl apply -f deployment.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gqwen
  namespace: ia
  labels:
    workload.user.cattle.io/workloadselector: apps.deployment-ia-gqwen
spec:
  replicas: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: apps.deployment-ia-gqwen
  template:
    metadata:
      labels:
        workload.user.cattle.io/workloadselector: apps.deployment-ia-gqwen
      annotations:
        cattle.io/timestamp: ""
    spec:
      imagePullSecrets:
        - name: gitlab
      preemptionPolicy: PreemptLowerPriority
      priority: 0
      serviceAccount: default
      serviceAccountName: default
      enableServiceLinks: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      nodeName: allybot-prod
      # Dono/permissão do volume (uid 100, gid 101 = user grouter na imagem; ajuste com `kubectl exec -- id`)
      securityContext:
        fsGroup: 101
        runAsUser: 100
        runAsGroup: 101
      # Se o teu storage ignorar fsGroup, o init ajusta o dono do PVC
      initContainers:
        - name: fix-data-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 100:101 /data && chmod -R u+rwX /data || true"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            privileged: false
          resources: {}
          volumeMounts:
            - name: vol-s1ine
              mountPath: /data
      containers:
        - name: container-0
          image: registry.gitlab.com/all-docker/image/grouter:v1.0.0
          imagePullPolicy: Always
          # Garante o proxy (por defeito: tini + grouter serve fg). Se falhar, a imagem no registry pode ter CMD outro.
          command: ["/sbin/tini", "--", "grouter", "serve", "fg"]
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {}
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 100
            runAsGroup: 101
          ports:
            - name: 3099tcp
              containerPort: 3099
              protocol: TCP
            - name: 3100tcp
              containerPort: 3100
              protocol: TCP
          # Se precisares das portas 3101–3110 (pin por provider), adiciona aqui
          # e no Service / Load Balancer
          startupProbe:
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 3099
            timeoutSeconds: 1
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - name: vol-s1ine
              mountPath: /data
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
      volumes:
        - name: vol-s1ine
          persistentVolumeClaim:
            claimName: grouter-pvc
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3607
                  path: token
              - configMap:
                  items:
                    - key: ca.crt
                      path: ca.crt
                  name: kube-root-ca.crt
              - downwardAPI:
                  items:
                    - fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
                      path: namespace
      tolerations:
        - effect: NoExecute
          key: node.kubernetes.io/not-ready
          operator: Exists
          tolerationSeconds: 300
        - effect: NoExecute
          key: node.kubernetes.io/unreachable
          operator: Exists
          tolerationSeconds: 300
